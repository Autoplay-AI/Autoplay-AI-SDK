name: PR Title Check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  check-pr-title:
    name: Enforce PR naming convention
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title format
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Accepted formats:
          #   name/feature/short-description   e.g. marie/feature/add-async-client
          #   name/fix/short-description       e.g. marie/fix/reconnection-loop
          #   name/docs/short-description      e.g. marie/docs/update-quickstart
          #   name/chore/short-description     e.g. marie/chore/bump-dependencies
          #   name/refactor/short-description  e.g. marie/refactor/context-store
          #   hotfix/short-description         e.g. hotfix/sse-disconnect-crash

          PATTERN='^[a-z][a-z0-9-]+/(feature|fix|docs|chore|refactor)/[a-z0-9][a-z0-9._-]+$|^hotfix/[a-z0-9][a-z0-9._-]+$'

          if echo "$PR_TITLE" | grep -qE "$PATTERN"; then
            echo "✅ PR title is valid: '$PR_TITLE'"
          else
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  ❌  INVALID PR TITLE"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "  Your title:  \"$PR_TITLE\""
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  HOW TO FIX"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "  PR titles must follow one of these two formats:"
            echo ""
            echo "  1.  your-name/type/short-description"
            echo "      └─ for all normal work"
            echo ""
            echo "  2.  hotfix/short-description"
            echo "      └─ for urgent production bug fixes only"
            echo ""
            echo "  ┌─────────────┬──────────────────────────────────────────────┐"
            echo "  │  type       │  use when                                    │"
            echo "  ├─────────────┼──────────────────────────────────────────────┤"
            echo "  │  feature    │  adding a new capability                     │"
            echo "  │  fix        │  fixing a non-urgent bug                     │"
            echo "  │  docs       │  documentation changes only                  │"
            echo "  │  chore      │  deps, CI, config — no production code       │"
            echo "  │  refactor   │  restructuring with no behaviour change      │"
            echo "  └─────────────┴──────────────────────────────────────────────┘"
            echo ""
            echo "  ✅  Good examples:"
            echo "      marie/feature/add-proactive-triggers"
            echo "      marie/fix/reconnection-loop"
            echo "      marie/docs/update-quickstart"
            echo "      hotfix/sse-disconnect-crash"
            echo ""
            echo "  ❌  Common mistakes:"
            echo "      'Add new feature'           → missing name and type prefix"
            echo "      'marie/Feature/my thing'    → uppercase and spaces not allowed"
            echo "      'marie/feature/'            → description segment is empty"
            echo "      'bug fix for SSE'           → use  hotfix/sse-fix  instead"
            echo ""
            echo "  Fix the title in GitHub → Edit → Save, then this check re-runs."
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi
