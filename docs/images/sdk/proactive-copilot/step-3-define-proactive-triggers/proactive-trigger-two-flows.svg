  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">A proactive trigger fires in two ways: Flow A sends a textual proactive trigger, the user interacts with the chatbot, and that leads to visual guidance. Flow B skips the chatbot and delivers visual guidance directly.</desc>
